<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Guess Number Game - Lobby</title>
    <link rel="stylesheet" href="../../css/INTRO.css">
    <link rel="stylesheet" type="text/css" href="https://www.w3schools.com/w3css/4/w3.css">
    <link type="text/css" rel="stylesheet" href="https://cdn.firebase.com/libs/firebaseui/3.5.2/firebaseui.css" />
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        #lobbyList {
            margin: 20px auto;
            max-width: 600px;
        }
        .game-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border: 1px solid #ccc;
            margin-bottom: 8px;
            border-radius: 4px;
            background: #f9f9f9;
        }
        button {
            padding: 8px 16px;
            font-size: 15px;
            cursor: pointer;
            margin: 4px;
        }
        #statusMsg {
            text-align: center;
            color: #555;
            margin-top: 10px;
        }
        .btn-area {
            text-align: center;
            margin-top: 20px;
        }
             #leaderboard {
            margin: 20px auto;
            width: 80%;
            max-width: 600px;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        #leaderboard th, #leaderboard td {
            padding: 10px;
            border: 1px solid #ddd;
        }
        #leaderboard th {
            background-color: #3498db;
            color: white;
        }
        #leaderboard tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        #leaderboard tr:hover {
            background-color: #f1f1f1;
        }
        #loading {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>Random Guess Number Game</h1>
    <p style="text-align:center;">Pick a game to join or make a new one!</p>

    <p id="statusMsg" style="text-align:center;color:#555;">Loading games...</p>
    <div id="lobbyList"></div>

    <div class="btn-area">
        <button id="b_createGame">Create New Game</button>
        <button onclick="window.location.href='../../html/info.html'">How to Play</button>
        <button onclick="window.location.href='../../html/choseGame.html'">Back</button>
         <button onclick="window.location.href='../../html/mainMenu.html'">Main Menu</button>
    </div>

    <script type="module" src="./randomGuessNumberGame.mjs"></script>
<!-- leaderboard page for the random guess number game // copy from the bacteria game leaderboard page -->
<h2>Leaderboard</h2>
    <table id="leaderboard">
        <thead>
            <tr>
                <th>Rank</th>
                <th>Name</th>
                <th>Score</th>
                <th>wins</th>
                <th>losses</th>                
                
                
                
            </tr>
        </thead>
        <tbody id="leaderboard-body">
            <tr><td colspan="4" id="loading">Loading leaderboard...</td></tr>
        </tbody>
    </table>
    

    <!-- Firebase and game scripts -->
    <script defer type="module">
        import { fb_initialise, fb_getLeaderboard } from '../../fb/fb_io.mjs';
        console.log('before fb')
        
        // Initialize Firebase
        fb_initialise();

        // Fetch and display leaderboard
        async function loadLeaderboard() {
            try {
                console.log('start')
                const scores = await fb_getLeaderboard('RGNG', 10);
                const leaderboardBody = document.getElementById('leaderboard-body');
                leaderboardBody.innerHTML = ''; // Clear loading message

                if (scores.length === 0) {
                    leaderboardBody.innerHTML = '<tr><td colspan="4">No scores available</td></tr>';
                    return;
                }

                scores.forEach((score, index) => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${score.gameName || 'Anonymous'}</td>
                        <td>${score.score}</td>
                        <td>${score.wins}</td>
                        <td>${score.losses}</td>
                        
                    `;
                    leaderboardBody.appendChild(row);
                });
            } catch (error) {
                console.error('Error loading leaderboard:', error);
                document.getElementById('leaderboard-body').innerHTML = 
                    '<tr><td colspan="4">Error loading leaderboard</td></tr>';
            }
        }

        // Load leaderboard when page loads
       loadLeaderboard();
        
    </script>


</body>
</html>
